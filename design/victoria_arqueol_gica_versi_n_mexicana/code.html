<!DOCTYPE html>

          darkMode: "class",

              colors: {
                "primary": "#db7706",
                "background-light": "#f8f7f5",
                "background-dark": "#231a0f",

              fontFamily: {
                "display": ["Plus Jakarta Sans", "sans-serif"]
              },

<title>¡Victoria! - Los Exploradores</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header Navigation -->
<header class="flex items-center p-4 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">

</button>
<h2 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">Resumen de Misión</h2>
</header>
<main class="flex-1 overflow-y-auto px-4 pb-24">

<div class="relative mt-4">

<div class="absolute inset-0 opacity-20 pointer-events-none overflow-hidden rounded-xl">
<div class="absolute top-0 left-1/4 w-2 h-2 bg-yellow-400 rounded-full"></div>
<div class="absolute top-1/4 right-1/4 w-3 h-3 bg-primary rounded-full"></div>
<div class="absolute bottom-1/4 left-1/3 w-2 h-2 bg-yellow-300 rotate-45"></div>

</div>
<!-- Hero Image Container -->
<div class="@container">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-primary/10 @[480px]:rounded-xl min-h-[320px] shadow-2xl shadow-primary/20 border-4 border-primary/20" data-alt="An epic ancient Mexican golden sun stone artifact found in a lush jungle temple surrounded by gold coins." style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuASow5CoTDGcAFPX3qVpswfSb539wAGqkCWT131e-mQJqcf9mWLJW2Zwp7-O3QuAcN4CI4NiyE5wROIa4qE_jyJXiQargndx7PWAKP2BzKQIUGTfrPgecfF3mcIipSrrX7eR_h-7UsRWi44ArhqU6MirnRLIJv7Lr9jKRViZqipDTg2Ql0M9aly7z6G0Ax74T_811-OszaALD9Xt1E76-b_iVGCSxkCvn62wicwsipofHSS9R0WLeXl-xBCFTNKLtgpWbrSvvy-Px8");'>
</div>
</div>
</div>

<div class="text-center py-8">
<div class="inline-flex items-center justify-center p-2 px-4 bg-primary/20 rounded-full text-primary font-bold text-sm mb-4">
<span class="material-symbols-outlined text-sm mr-2">stars</span>
                CAMPEONES DE LA EXPEDICIÓN
            </div>
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-4xl font-extrabold leading-tight mb-2">LOS EXPLORADORES</h1>
<p class="text-slate-600 dark:text-slate-400 text-lg font-medium max-w-xs mx-auto">
                ¡Felicidades! Habéis reclamado los tesoros ancestrales del templo perdido.
            </p>
</div>
<!-- Stats/Rewards Grid -->
<div class="grid grid-cols-2 gap-4 mb-8">
<div class="bg-white dark:bg-slate-800/50 p-4 rounded-xl border border-primary/10 text-center shadow-sm">
<span class="material-symbols-outlined text-primary text-3xl mb-1">trophy</span>
<p class="text-xs text-slate-500 uppercase font-bold tracking-wider">Puntos</p>
<p class="text-2xl font-extrabold text-slate-900 dark:text-slate-100">12,450</p>
</div>
<div class="bg-white dark:bg-slate-800/50 p-4 rounded-xl border border-primary/10 text-center shadow-sm">
<span class="material-symbols-outlined text-primary text-3xl mb-1">diamond</span>
<p class="text-xs text-slate-500 uppercase font-bold tracking-wider">Gemas</p>
<p class="text-2xl font-extrabold text-slate-900 dark:text-slate-100">84</p>
</div>
</div>

<div class="space-y-3 mb-8">

<div class="flex flex-col gap-3">

                    Compartir en Instagram
                </button>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-slate-800">
<button class="w-full py-4 bg-primary text-white rounded-xl font-extrabold text-lg flex items-center justify-center gap-2 shadow-lg shadow-primary/40 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">refresh</span>

<nav class="hidden">

<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">emoji_events</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400" href="#">

</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">settings</span>
</a>
