<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#db7706",
              "background-light": "#f8f7f5",
              "background-dark": "#231a0f",
            },
            fontFamily: {
              "display": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .aged-paper {
            background-color: #f8f7f5;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(219, 119, 6, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
            position: relative;
        }
        .aged-paper::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(219, 119, 6, 0.02) 0%, rgba(35, 26, 15, 0.02) 100%);
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative mx-auto max-w-md min-h-screen flex flex-col aged-paper border-x border-primary/10 shadow-2xl">
<header class="flex items-center p-4 border-b border-primary/10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-sm sticky top-0 z-10">
<button class="text-primary p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex-1 text-center">
<h1 class="text-xl font-bold tracking-tight">Scoreboard</h1>
<p class="text-xs font-semibold text-primary uppercase tracking-widest">Ronda 4 de 10</p>
</div>
<button class="text-primary p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">history</span>
</button>

<span class="text-3xl font-bold">145</span>
<div class="mt-2 h-1 w-12 bg-primary rounded-full"></div>
</div>
<div class="bg-primary/5 border border-primary/10 rounded-xl p-4 flex flex-col items-center justify-center text-center shadow-sm">

<span class="text-3xl font-bold">132</span>

</div>

</button>
<input class="w-12 text-center bg-transparent border-none focus:ring-0 text-lg font-bold p-0" type="number" value="12"/>

<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
</div>
<div class="flex items-center justify-between p-4 bg-white dark:bg-white/5 rounded-xl border border-primary/5 shadow-sm">

</button>
</div>
</div>

</button>
<input class="w-12 text-center bg-transparent border-none focus:ring-0 text-lg font-bold p-0" type="number" value="5"/>
<button class="size-8 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-500 flex items-center justify-center">
<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
</div>
<div class="flex items-center justify-between p-4 bg-white dark:bg-white/5 rounded-xl border border-primary/5 shadow-sm opacity-90">
<div class="flex items-center gap-3">
<div class="size-10 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center text-slate-500 font-bold">P4</div>
<span class="font-medium">Jugador 4</span>

<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-background-light dark:bg-background-dark border-t border-primary/10 p-4 space-y-3 z-20">
<button class="w-full bg-primary text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/20 hover:scale-[1.02] transition-transform active:scale-[0.98]">
<span class="material-symbols-outlined">add_circle</span>

<button class="w-full bg-transparent text-primary border-2 border-primary/30 font-bold py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-primary/5 transition-colors">

<div class="flex gap-2 border-t border-primary/10 bg-background-light px-4 pb-3 pt-2">

<div class="text-primary flex h-8 items-center justify-center">

<a class="flex flex-1 flex-col items-center justify-end gap-1 rounded-full text-slate-900 dark:text-slate-100" href="#">
